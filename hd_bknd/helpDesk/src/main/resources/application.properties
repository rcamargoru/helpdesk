spring.application.name=helpDesk
# Configuraci\u00c3\u00b3n general de la aplicaci\u00c3\u00b3n
server.port=8090
usuario-service.url=http://localhost:3000
# Configuraci\u00c3\u00b3n de la base de datos (SQL Server)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=JRHD_SSAS;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Pruebas25$.$
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuraci\u00c3\u00b3n de dialecto para SQL Server
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

