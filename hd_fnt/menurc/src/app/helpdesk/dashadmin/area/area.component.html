<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pruebas RC</title>  
    <style type="text/css">
    /* Estilos generales */
.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    background-color: #f4f6f9;
    border-radius: 8px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
  }
  
  h2, h3 {
    color: #333;
    font-weight: 600;
    margin-bottom: 15px;
  }
  
  /* Tabla de prioridades */
  .table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  
  .table th, .table td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid #ddd;
  }
  
  .table th {
    background-color: #007bff;
    color: #fff;
    font-weight: bold;
  }
  
  .table tr:nth-child(even) {
    background-color: #f9f9f9;
  }
  
  .table tr:hover {
    background-color: #f1f1f1;
  }
  
  .btn {
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
  }
  
  .btn-primary {
    background-color: #007bff;
    color: #fff;
    border: none;
  }
  
  .btn-primary:hover {
    background-color: #0056b3;
  }
  
  .btn-danger {
    background-color: #dc3545;
    color: #fff;
    border: none;
  }
  
  .btn-danger:hover {
    background-color: #c82333;
  }
  
  .btn-secondary {
    background-color: #6c757d;
    color: #fff;
    border: none;
  }
  
  .btn-secondary:hover {
    background-color: #5a6268;
  }
  
  .btn-success {
    background-color: #28a745;
    color: #fff;
    border: none;
  }
  
  .btn-success:hover {
    background-color: #218838;
  }
  
  /* Formulario de prioridades */
  .form-container {
    margin-top: 30px;
    padding: 20px;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
  }
  
  .form-group {
    margin-bottom: 15px;
  }
  
  .form-group label {
    font-weight: 500;
    display: block;
    margin-bottom: 5px;
    color: #333;
  }
  
  .form-control {
    width: 100%;
    padding: 8px;
    font-size: 14px;
    border: 1px solid #ced4da;
    border-radius: 4px;
    box-sizing: border-box;
  }
  
  .form-control:focus {
    border-color: #007bff;
    outline: none;
    box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
  }
     </style> 
</head>
<body>
<div class="container">
    <div class="container">
        <h2>Gestión de Áreas</h2>
        <!-- Lista de areas -->
        <div *ngIf="areas && areas.length > 0; else noData">
            <h3>Lista de Areas</h3>
            <table class="table"> 
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let area of areas">
                        <td>{{ area.nombreArea }}</td>
                        <td>{{ area.descripcion }}</td>
                        <td>
                            <button (click)="mostrarFormulario(area)" class="btn btn-primary">Editar</button>
                            <button (click)="eliminarArea(area.idArea)" class="btn btn-danger">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <ng-template #noData>
            <p>No hay areas registradas.</p>
        </ng-template>
    
        <!-- Botón para crear nueva area -->
        <button (click)="mostrarFormulario()" class="btn btn-success">Crear Nueva Area</button>
    
        <!-- Formulario para Crear/Editar area -->
        <div class="form-container" *ngIf="mostrarForm">
            <h3>{{ areaSeleccionada ? 'Editar Area' : 'Crear Nueva Area' }}</h3>
            <form (ngSubmit)="guardarArea()">
                <div class="form-group">
                    <label for="nombreArea">Nombre</label>
                    <input type="text" id="nombreArea" [(ngModel)]="areaForm.nombreArea" name="nombreArea" class="form-control" required />
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" [(ngModel)]="areaForm.descripcion" name="descripcion" class="form-control" required></textarea>
                </div>
                <button type="submit" class="btn btn-success">{{ areaSeleccionada ? 'Actualizar' : 'Crear' }}</button>
                <button type="button" (click)="cancelarEdicion()" class="btn btn-secondary">Cancelar</button>
            </form>
        </div>
    </div>    
  </div>
</body>
</html>
